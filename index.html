<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Ephesis&family=Poppins:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<title>Mitt Galleri</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(to right, #f3dbf0, #f7d8c6); /* gradient bakgrunden */
  color: #333;
}

/* Navigation högst upp */
nav {
  display: flex;
  justify-content: center;
  gap: 15px;
  padding: 20px 0;
}

nav a {
  text-decoration: none;
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  color: #3b3b3b;
  padding: 6px 12px;
  margin-top: 40px;
  margin-bottom: 50px;
  border-radius: 5px;
  transition: all 0.3s;
}

nav a:hover {
  background-color: #a36478;
  color: white;
}

nav a:focus {
  outline: 3px solid #000000;
  outline-offset: 3px;
  background-color: #ffe6cc;
}

nav a.active {
  background-color: #c57c93; /* samma som hover */
  color: white;
}

/* Huvudbild centrerad */
.main img {
  max-width: 50%;
  height: auto;
  display: block;
  margin: 0 auto;
}

/* Footer */
footer {
  text-align: center;
  padding: 10px;
  font-size: 12px;
  margin-top: 40px;
  color: #3b3b3b;
}
</style>
</head>

<body>

<!-- Header med navigation -->
<header>
  <nav>
    <a href="index.html" class="active" aria-current="page">Hem</a>
    <a href="om.html">Om</a>
    <a href="galleri.html">Galleri</a>
  </nav>
</header>

<!-- Huvudinnehåll med aria-label för skärmläsare -->
<main class="main" aria-label="Huvudinnehåll: bilder från galleriet">
  <img src="welcome2.jpeg" alt="Välkomstbild med texten 'Welcome' i dekorativ stil">
  <img src="index.jpeg" alt="Huvudbild med en illustration av Procreate loggan, en iPad och Apple Pencil som skrivit 'Mitt galleri' i en sammanhängande linje">
</main>

<!-- Footer -->
<footer>
2026 Johanna Nordling
</footer>

</body>
</html>
